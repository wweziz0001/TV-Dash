services:
  postgres:
    image: postgres:16-alpine
    container_name: tv-dash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tvdash
      POSTGRES_USER: tvdash
      POSTGRES_PASSWORD: tvdash
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

